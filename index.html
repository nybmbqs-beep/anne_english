<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英検チャレンジ！</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app {
      background: white;
      border-radius: 30px;
      padding: 30px;
      max-width: 780px;
      width: 100%;
      min-height: 80vh;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .screen { display: none; }
    .screen.active { display: block; }

    h1 {
      font-size: 2rem;
      text-align: center;
      color: #5c35b0;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 24px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 18px;
      margin: 10px 0;
      border: none;
      border-radius: 16px;
      font-size: 1.2rem;
      font-weight: bold;
      color: white;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }

    .btn-purple { background: linear-gradient(135deg, #667eea, #764ba2); }
    .btn-pink   { background: linear-gradient(135deg, #f093fb, #f5576c); }
    .btn-blue   { background: linear-gradient(135deg, #4facfe, #00f2fe); }
    .btn-green  { background: linear-gradient(135deg, #43e97b, #38f9d7); }
    .btn-orange { background: linear-gradient(135deg, #fa709a, #fee140); }
    .btn-red    { background: linear-gradient(135deg, #f5365c, #f56036); }

    .back-btn {
      background: none;
      border: 2px solid #ddd;
      border-radius: 10px;
      padding: 8px 16px;
      color: #888;
      cursor: pointer;
      margin-bottom: 16px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ホーム画面 -->
  <div id="screen-home" class="screen active">
    <h1>🌟 英検チャレンジ！</h1>
    <p class="subtitle">たのしく英語をおぼえよう！</p>
    <p style="text-align:center;font-size:1rem;color:#555;margin-bottom:16px;">どのきゅうにチャレンジする？</p>
    <button class="btn btn-pink"   onclick="go('mode','9')">🌱 9きゅう（はじめてさん）</button>
    <button class="btn btn-blue"   onclick="go('mode','8')">🌿 8きゅう</button>
    <button class="btn btn-green"  onclick="go('mode','7')">🌸 7きゅう</button>
    <button class="btn btn-orange" onclick="go('mode','6')">🌻 6きゅう</button>
    <button class="btn btn-purple" onclick="go('mode','5')">⭐ 5きゅう（英検5きゅう！）</button>
  </div>

  <!-- モード選択 -->
  <div id="screen-mode" class="screen">
    <button class="back-btn" onclick="show('home')">← もどる</button>
    <h1>なにを練習する？</h1>
    <p class="subtitle">えらんでね！</p>
    <button class="btn btn-purple" onclick="go('diff','vocab')">📝 たんご（英単語）</button>
    <button class="btn btn-pink"   onclick="go('diff','sent')">💬 ぶんしょう（英語の文）</button>
    <button class="btn btn-blue"   onclick="go('diff','mix')">🎯 ミックス（たんご＋ぶんしょう）</button>
  </div>

  <!-- むずかしさ選択 -->
  <div id="screen-diff" class="screen">
    <button class="back-btn" onclick="show('mode')">← もどる</button>
    <h1>むずかしさは？</h1>
    <p class="subtitle">じぶんにあったレベルをえらんでね</p>
    <button class="btn btn-green"  onclick="go('quiz','easy')">😊 かんたん（3つからえらぶ、ヒントあり）</button>
    <button class="btn btn-orange" onclick="go('quiz','normal')">😤 ふつう（4つからえらぶ）</button>
    <button class="btn btn-red"    onclick="go('quiz','hard')">💪 むずかしい（じぶんで入力！）</button>
  </div>

  <!-- クイズ画面（あとで追加） -->
  <div id="screen-quiz" class="screen">
    <p style="text-align:center;padding:40px;color:#888;">クイズをよみこみ中...</p>
  </div>

  <!-- けっか画面（あとで追加） -->
  <div id="screen-results" class="screen">
    <p style="text-align:center;padding:40px;color:#888;">けっかをひょうじ中...</p>
  </div>

</div>

<script>
  // じょうたい管理
  const state = { grade: null, mode: null, diff: null };

  // 画面遷移
  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
  }

  function go(next, val) {
    if (next === 'mode')  { state.grade = val; show('mode'); }
    if (next === 'diff')  { state.mode  = val; show('diff'); }
    if (next === 'quiz')  { state.diff  = val; show('quiz'); startQuiz(); }
  }

  function startQuiz() {
    document.getElementById('screen-quiz').innerHTML =
      '<p style="text-align:center;padding:40px;color:#888;">クイズ準備中… (もうすぐ追加するよ！)<br><br>' +
      'きゅう: ' + state.grade + ' / モード: ' + state.mode + ' / レベル: ' + state.diff + '</p>' +
      '<button class="btn btn-purple" onclick="show(\'home\')" style="margin-top:20px">ホームへもどる</button>';
  }
</script>
</body>
</html>
